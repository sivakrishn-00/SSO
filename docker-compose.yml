version: '3.8'

services:
  backend:
    build: ./backend
    container_name: sso_backend
    # No ports exposed to host directly, accessed via frontend proxy
    environment:
      - DB_NAME=SSO
      - DB_USER=root
      - DB_PASSWORD=root_123
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  frontend:
    build: ./frontend
    container_name: sso_frontend
    ports:
      - "8004:80"
    depends_on:
      - backend
    restart: always
